version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: speechflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: speechflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U speechflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://speechflow:${POSTGRES_PASSWORD}@db:5432/speechflow
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OLLAMA_ENDPOINT=http://host.docker.internal:11434
      - CORS_ORIGINS=http://localhost:80,http://localhost:5173,http://localhost
      # Required for Pyannote diarization model access
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./temp:/app/temp
      - ./exports:/app/exports
      - ./transcripts:/app/transcripts
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    # Allows the container to access Ollama running on the host OS
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  huggingface_cache:
